name: Test CFTC/NFA Access

on:
  workflow_dispatch:

jobs:
  test-access:
    runs-on: ubuntu-latest
    steps:
      - name: Test CFTC Trading Organizations page
        run: |
          echo "--- CFTC Trading Org (Kalshi) ---"
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\nRedirect URL: %{redirect_url}\n" \
            -A "Mozilla/5.0" \
            "https://www.cftc.gov/IndustryOversight/IndustryFilings/TradingOrganizations/42993"

      - name: Test CFTC Clearing Organizations page
        run: |
          echo "--- CFTC Clearing Org ---"
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\nRedirect URL: %{redirect_url}\n" \
            -A "Mozilla/5.0" \
            "https://www.cftc.gov/IndustryOversight/IndustryFilings/ClearingOrganizations/38"

      - name: Test NFA Basic Profile page
        run: |
          echo "--- NFA Profile (Kalshi) ---"
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\nRedirect URL: %{redirect_url}\n" \
            -A "Mozilla/5.0" \
            "https://www.nfa.futures.org/BasicNet/basic-profile.aspx?nfaid=0560285"

      - name: Test CFTC Industry Filings landing page
        run: |
          echo "--- CFTC Industry Filings ---"
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\nRedirect URL: %{redirect_url}\n" \
            -A "Mozilla/5.0" \
            "https://www.cftc.gov/IndustryOversight/IndustryFilings"

  test-nfa-playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Test NFA Basic Profile with Playwright
        run: |
          cat << 'SCRIPT' > test-nfa.mjs
          import { chromium } from 'playwright';

          const urls = [
            { name: 'NFA Kalshi Profile', url: 'https://www.nfa.futures.org/BasicNet/basic-profile.aspx?nfaid=0560285' },
            { name: 'NFA Basic Search', url: 'https://www.nfa.futures.org/BasicNet/basic-search-landing.aspx' }
          ];

          const browser = await chromium.launch();
          const context = await browser.newContext();

          for (const { name, url } of urls) {
            console.log(`\n--- ${name} ---`);
            console.log(`URL: ${url}`);
            const page = await context.newPage();
            try {
              const response = await page.goto(url, { waitUntil: 'networkidle', timeout: 30000 });
              console.log(`HTTP Status: ${response.status()}`);
              const title = await page.title();
              console.log(`Page Title: ${title}`);
              const bodyText = await page.evaluate(() => document.body.innerText.substring(0, 500));
              console.log(`Content Preview:\n${bodyText}`);
              console.log(`Result: SUCCESS`);
            } catch (e) {
              console.log(`Error: ${e.message}`);
              console.log(`Result: FAILED`);
            }
            await page.close();
          }

          await browser.close();
          SCRIPT
          node test-nfa.mjs
